name: CD — Deploy to Render

on:
  # Only deploy when CI passes on main
  workflow_run:
    workflows: [ "CI — Flight Delay Prediction" ]
    types: [ completed ]
    branches: [ main ]

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options: [ production, staging ]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Guard — only deploy if CI succeeded
  # ─────────────────────────────────────────────────────────────
  check-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: CI status check
        run: |
          echo "CI passed. Proceeding with deployment."
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch:  ${{ github.ref_name }}"

  # ─────────────────────────────────────────────────────────────
  # Deploy to Render
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: check-ci
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate app before deploy
        run: |
          cd backend
          python - <<'EOF'
          import os
          os.environ["SECRET_KEY"]    = "pre-deploy-check"
          os.environ["DATABASE_URL"]  = ""
          from app import app
          client = app.test_client()
          r = client.get("/")
          assert r.status_code == 200, f"/ returned {r.status_code}"
          r2 = client.get("/dashboard")
          assert r2.status_code == 200, f"/dashboard returned {r2.status_code}"
          print("Pre-deploy validation passed.")
          EOF
        env:
          SECRET_KEY: pre-deploy-validation
          DATABASE_URL: ""

      - name: Trigger Render deploy hook
        # Add RENDER_DEPLOY_HOOK_URL in GitHub → Settings → Secrets → Actions
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              -H "Content-Type: application/json" \
              --fail
            echo "Render deploy hook triggered."
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping auto-deploy."
            echo "Set it in: GitHub → Settings → Secrets → Actions"
          fi

      - name: Wait for Render deployment
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          echo "Waiting 60s for Render to build and deploy..."
          sleep 60

      - name: Smoke test live deployment
        # Add RENDER_APP_URL in GitHub Secrets, e.g. https://flightdelay.onrender.com
        if: ${{ secrets.RENDER_APP_URL != '' }}
        run: |
          echo "Running smoke test on ${{ secrets.RENDER_APP_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_APP_URL }}" --max-time 30)
          if [ "$STATUS" = "200" ]; then
            echo "Live smoke test PASSED — app is up."
          else
            echo "Live smoke test FAILED — HTTP $STATUS"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "========================================"
          echo "  Deployment Complete"
          echo "========================================"
          echo "  Project : Flight Delay Prediction"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Time    : $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "========================================"
