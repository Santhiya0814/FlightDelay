<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Flight Delay Prediction{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand">
        <i class="fas fa-plane-departure"></i>
        <span>FlightDelay<span class="brand-accent">AI</span></span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
          <i class="fas fa-search"></i> Predict
        </a>
        <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
          <i class="fas fa-chart-bar"></i> Dashboard
        </a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p><i class="fas fa-plane"></i> Flight Delay Prediction &mdash; Ensemble Learning &copy; 2026</p>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
